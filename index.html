<title>课题组主页</title>

<style>
  :root{
    --bg:#F4F1E8;
    --surface:#FBF9F2;
    --ink:#1E1C17;
    --ink-soft:#4A463C;
    --ink-faint:#8C8472;
    --line:#DDD6C4;
    --accent:#0E4E48;
    --accent-soft:#E4ECE8;
    --serif:"Spectral","Noto Serif SC",Georgia,serif;
    --sans:"Noto Sans SC","Public Sans",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;scroll-padding-top:88px;}
  body{
    font-family:var(--sans);
    background:var(--bg);
    color:var(--ink);
    line-height:1.6;
    font-weight:400;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
    background:
      radial-gradient(1100px 600px at 82% -12%, rgba(14,78,72,.07), transparent 60%),
      radial-gradient(900px 520px at -8% 8%, rgba(165,95,45,.05), transparent 55%);
  }
  body::after{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.45;
    background-image:radial-gradient(rgba(30,28,23,.05) 1px, transparent 1px);
    background-size:24px 24px;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 clamp(1.2rem,4vw,2.5rem);}

  /* ---- 顶部导航 ---- */
  .site-header{
    position:sticky;top:0;z-index:50;
    background:rgba(244,241,232,.82);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;gap:1.2rem;}
  .nav-brand{font-family:var(--serif);font-weight:600;font-size:1.05rem;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .nav-right{display:flex;align-items:center;gap:1.1rem;min-width:0;}
  .nav-links{display:flex;gap:1.3rem;overflow-x:auto;}
  .nav-links a{
    color:var(--ink-soft);text-decoration:none;font-size:.82rem;
    letter-spacing:.04em;white-space:nowrap;position:relative;padding-bottom:2px;
    transition:color .2s;
  }
  .nav-links a::after{
    content:"";position:absolute;left:0;bottom:-1px;width:0;height:1.5px;
    background:var(--accent);transition:width .25s;
  }
  .nav-links a:hover{color:var(--accent);}
  .nav-links a:hover::after{width:100%;}
  .lang-toggle{
    font-family:var(--sans);font-size:.8rem;letter-spacing:.04em;
    color:var(--accent);background:var(--accent-soft);
    border:1px solid color-mix(in srgb,var(--accent) 28%, transparent);
    padding:.32rem .8rem;border-radius:999px;cursor:pointer;white-space:nowrap;
    transition:background .2s,color .2s,transform .15s;
  }
  .lang-toggle:hover{background:var(--accent);color:#fff;}
  .lang-toggle:active{transform:scale(.96);}

  /* ---- 头部 Hero ---- */
  .hero{padding:clamp(3rem,8vw,6rem) 0 clamp(2rem,5vw,3.5rem);}
  .hero .kicker{
    font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;
    color:var(--accent);font-weight:500;margin-bottom:1.1rem;
  }
  .hero h1{
    font-family:var(--serif);font-weight:600;line-height:1.08;
    font-size:clamp(2.2rem,5.5vw,4rem);letter-spacing:-.01em;
  }
  .hero .name-en{
    font-family:var(--serif);font-style:italic;font-weight:400;
    color:var(--ink-faint);font-size:clamp(1.05rem,2.4vw,1.45rem);margin-top:.5rem;
  }
  .hero .intro{
    margin-top:1.6rem;max-width:64ch;color:var(--ink-soft);
    font-size:1.05rem;font-weight:300;
  }
  .hero .meta{
    margin-top:1.7rem;display:flex;flex-wrap:wrap;gap:.4rem 1.6rem;
    font-size:.9rem;color:var(--ink-faint);
  }
  .hero .meta a{color:var(--ink-soft);text-decoration:none;border-bottom:1px solid var(--line);transition:color .2s,border-color .2s;}
  .hero .meta a:hover{color:var(--accent);border-color:var(--accent);}

  /* ---- 分区标题 ---- */
  .section-head{display:flex;align-items:baseline;gap:1rem;margin:3.2rem 0 1.5rem;}
  .section-head h2{font-family:var(--serif);font-weight:600;font-size:1.55rem;white-space:nowrap;}
  .section-head .count{color:var(--ink-faint);font-size:.82rem;}
  .section-head .rule{flex:1;height:1px;background:var(--line);}

  /* ---- 成员卡片 ---- */
  .grid{
    display:grid;gap:1.2rem;
    grid-template-columns:repeat(auto-fill,minmax(min(100%,290px),1fr));
  }
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:1.5rem;display:flex;flex-direction:column;gap:.55rem;
    transition:transform .28s ease,box-shadow .28s ease,border-color .28s ease;
  }
  .card:hover{
    transform:translateY(-4px);
    box-shadow:0 16px 34px -18px rgba(30,28,23,.38);
    border-color:color-mix(in srgb,var(--accent) 42%, var(--line));
  }
  .card-top{display:flex;gap:.95rem;align-items:center;}
  .avatar{
    width:58px;height:58px;border-radius:50%;flex:0 0 auto;object-fit:cover;overflow:hidden;
    background:var(--accent-soft);display:flex;align-items:center;justify-content:center;
    color:var(--accent);font-family:var(--serif);font-weight:600;font-size:1.4rem;
    border:1px solid color-mix(in srgb,var(--accent) 18%, var(--line));
  }
  .card-name{font-family:var(--serif);font-weight:600;font-size:1.22rem;line-height:1.2;}
  .card-name-en{font-family:var(--serif);font-style:italic;font-weight:400;font-size:.92rem;color:var(--ink-faint);margin-left:.1rem;}
  .card-title{color:var(--ink-soft);font-size:.9rem;margin-top:.15rem;}
  .tag{
    align-self:flex-start;font-size:.72rem;letter-spacing:.04em;color:var(--accent);
    background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 22%, transparent);
    padding:.16rem .55rem;border-radius:999px;
  }
  .card-interests{color:var(--ink-soft);font-size:.92rem;font-weight:300;}
  .card-note{color:var(--ink-faint);font-size:.86rem;font-style:italic;}
  .card-links{margin-top:auto;padding-top:.5rem;display:flex;gap:.75rem;align-items:center;}
  .card-links a{color:var(--ink-faint);display:inline-flex;transition:color .2s,transform .2s;}
  .card-links a:hover{color:var(--accent);transform:translateY(-2px);}
  .card-links svg{width:18px;height:18px;display:block;}

  /* ---- 页脚 ---- */
  footer{margin-top:4.5rem;padding:2.6rem 0 3.5rem;border-top:1px solid var(--line);color:var(--ink-faint);font-size:.9rem;}
  footer .foot-name{font-family:var(--serif);color:var(--ink);font-size:1.05rem;font-weight:600;margin-bottom:.4rem;}
  footer a{color:var(--ink-soft);text-decoration:none;border-bottom:1px solid var(--line);}
  footer a:hover{color:var(--accent);border-color:var(--accent);}

  /* ---- 载入动画 ---- */
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  .reveal{opacity:0;animation:fadeUp .6s cubic-bezier(.2,.7,.2,1) forwards;animation-delay:calc(var(--i,0)*55ms);}
  @media (prefers-reduced-motion:reduce){.reveal{animation:none;opacity:1;}}

  @media (max-width:760px){
    .nav-links{display:none;}
  }
</style>
</head>

/* =========================================================================
   以下为渲染逻辑,一般无需改动。Rendering logic below.
   ========================================================================= */

let lang = (navigator.language||"").toLowerCase().startsWith("zh") ? "zh" : "en";

function t(v){ if(v==null) return ""; if(typeof v==="object") return v[lang] ?? v.zh ?? v.en ?? ""; return v; }
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

const ICONS = {
  email:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>',
  homepage:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.4 2.5 2.4 15 0 18M12 3c-2.4 2.5-2.4 15 0 18"/></svg>',
  scholar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 4 2 9l10 5 10-5-10-5z"/><path d="M6 11.5V16c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-4.5"/><path d="M22 9v5"/></svg>',
  github:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5A11.5 11.5 0 0 0 .5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56v-2c-3.2.7-3.88-1.37-3.88-1.37-.53-1.34-1.29-1.7-1.29-1.7-1.05-.72.08-.71.08-.71 1.16.08 1.77 1.2 1.77 1.2 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.56-.29-5.25-1.28-5.25-5.7 0-1.26.45-2.29 1.2-3.1-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.77.11 3.06.75.81 1.2 1.84 1.2 3.1 0 4.43-2.69 5.41-5.26 5.69.41.36.78 1.07.78 2.16v3.2c0 .31.21.68.8.56A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5z"/></svg>',
  orcid:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><line x1="9" y1="8.5" x2="9" y2="16.5"/><circle cx="9" cy="6.4" r=".9" fill="currentColor" stroke="none"/><path d="M12.5 8.5h2.2a4 4 0 0 1 0 8h-2.2z"/></svg>',
};

function linkEl(url,type,label){
  if(!url) return "";
  const l = esc(t(label));
  return `<a href="${esc(url)}" target="_blank" rel="noopener" aria-label="${l}" title="${l}">${ICONS[type]}</a>`;
}

function avatarError(img){
  const d=document.createElement("div");
  d.className="avatar"; d.setAttribute("aria-hidden","true");
  d.textContent=img.getAttribute("data-initial")||"·";
  img.replaceWith(d);
}

function avatarEl(m){
  const initial = (t(m.name)||"").trim().charAt(0) || "·";
  const photo = t(m.photo);
  if(photo){ return `<img class="avatar" src="${esc(photo)}" alt="${esc(t(m.name))}" loading="lazy" data-initial="${esc(initial)}" onerror="avatarError(this)">`; }
  return `<div class="avatar" aria-hidden="true">${esc(initial)}</div>`;
}

function cardEl(m,i,rc,si){
  const links = [
    linkEl(m.email?("mailto:"+t(m.email)):"","email",{zh:"邮箱",en:"Email"}),
    linkEl(t(m.homepage),"homepage",{zh:"个人主页",en:"Homepage"}),
    linkEl(t(m.scholar),"scholar","Google Scholar"),
    linkEl(t(m.github),"github","GitHub"),
    linkEl(t(m.orcid),"orcid","ORCID"),
  ].join("");
  const nameEn=t(m.nameEn), title=t(m.title), year=t(m.year), interests=t(m.interests), note=t(m.note);
  return `
  <article class="card${rc}"${si(i)}>
    <div class="card-top">
      ${avatarEl(m)}
      <div>
        <div class="card-name">${esc(t(m.name))}${nameEn?` <span class="card-name-en">${esc(nameEn)}</span>`:""}</div>
        ${title?`<div class="card-title">${esc(title)}</div>`:""}
      </div>
    </div>
    ${year?`<span class="tag">${esc(year)}</span>`:""}
    ${interests?`<p class="card-interests">${esc(interests)}</p>`:""}
    ${note?`<p class="card-note">${esc(note)}</p>`:""}
    ${links.trim()?`<div class="card-links">${links}</div>`:""}
  </article>`;
}

function render(animate){
  const rc = animate ? " reveal" : "";
  const si = (i)=> animate ? ` style="--i:${i}"` : "";
  const other = lang==="zh" ? "en" : "zh";

  document.documentElement.lang = lang==="zh" ? "zh-CN" : "en";
  document.title = t(LAB_INFO.name);
  document.getElementById("nav-brand").textContent = t(LAB_INFO.name);
  document.getElementById("lang-toggle").textContent = UI.toggle[lang];

  // Hero
  let heroHTML = "";
  if(t(LAB_INFO.institution)) heroHTML += `<div class="kicker${rc}"${si(0)}>${esc(t(LAB_INFO.institution))}</div>`;
  heroHTML += `<h1 class="${rc.trim()}"${si(1)}>${esc(t(LAB_INFO.name))}</h1>`;
  if(LAB_INFO.name[other]) heroHTML += `<div class="name-en${rc}"${si(2)}>${esc(LAB_INFO.name[other])}</div>`;
  if(t(LAB_INFO.intro)) heroHTML += `<p class="intro${rc}"${si(3)}>${esc(t(LAB_INFO.intro))}</p>`;
  const metaBits = [];
  if(LAB_INFO.email) metaBits.push(`${esc(t(UI.emailLabel))} <a href="mailto:${esc(t(LAB_INFO.email))}">${esc(t(LAB_INFO.email))}</a>`);
  const addr = t(LAB_INFO.address); if(addr) metaBits.push(esc(addr));
  if(metaBits.length) heroHTML += `<div class="meta${rc}"${si(4)}>${metaBits.map(b=>`<span>${b}</span>`).join("")}</div>`;
  document.getElementById("hero").innerHTML = heroHTML;

  // 按分组归类
  const groups = {};
  MEMBERS.forEach(m=>{(groups[m.category]=groups[m.category]||[]).push(m);});

  let navHTML = "", bodyHTML = "", idx = 5;
  CATEGORIES.forEach((cat,gi)=>{
    const list = groups[cat.zh];
    if(!list || !list.length) return;
    const id = "group-"+gi;
    navHTML += `<a href="#${id}">${esc(t(cat))}</a>`;
    const cards = list.map(m=>cardEl(m,idx++,rc,si)).join("");
    bodyHTML += `
    <section id="${id}">
      <div class="section-head${rc}"${si(idx)}>
        <h2>${esc(t(cat))}</h2>
        <span class="count">${list.length}</span>
        <span class="rule"></span>
      </div>
      <div class="grid">${cards}</div>
    </section>`;
  });
  document.getElementById("nav-links").innerHTML = navHTML;
  document.getElementById("members").innerHTML = bodyHTML;

  // 页脚
  const foot = [];
  foot.push(`<div class="foot-name">${esc(t(LAB_INFO.name))}</div>`);
  if(addr) foot.push(`<div>${esc(addr)}</div>`);
  if(LAB_INFO.email) foot.push(`<div>Email · <a href="mailto:${esc(t(LAB_INFO.email))}">${esc(t(LAB_INFO.email))}</a></div>`);
  foot.push(`<div style="margin-top:1rem;">© ${new Date().getFullYear()} ${esc(t(LAB_INFO.name))}</div>`);
  document.getElementById("footer").innerHTML = foot.join("");
}

document.getElementById("lang-toggle").addEventListener("click", ()=>{
  lang = lang==="zh" ? "en" : "zh";
  render(false);
});

render(true);
</script>
