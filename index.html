<style>
  :root{
    --bg:#F4F1E8;
    --surface:#FBF9F2;
    --ink:#1E1C17;
    --ink-soft:#4A463C;
    --ink-faint:#8C8472;
    --line:#DDD6C4;
    --accent:#0E4E48;
    --accent-soft:#E4ECE8;
    --serif:"Spectral","Noto Serif SC",Georgia,serif;
    --sans:"Noto Sans SC","Public Sans",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;scroll-padding-top:88px;}
  body{
    font-family:var(--sans);
    background:var(--bg);
    color:var(--ink);
    line-height:1.6;
    font-weight:400;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
    background:
      radial-gradient(1100px 600px at 82% -12%, rgba(14,78,72,.07), transparent 60%),
      radial-gradient(900px 520px at -8% 8%, rgba(165,95,45,.05), transparent 55%);
  }
  body::after{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.45;
    background-image:radial-gradient(rgba(30,28,23,.05) 1px, transparent 1px);
    background-size:24px 24px;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 clamp(1.2rem,4vw,2.5rem);}

  /* ---- 顶部导航 ---- */
  .site-header{
    position:sticky;top:0;z-index:50;
    background:rgba(244,241,232,.82);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;gap:1.5rem;}
  .nav-brand{font-family:var(--serif);font-weight:600;font-size:1.1rem;letter-spacing:.01em;white-space:nowrap;}
  .nav-links{display:flex;gap:1.4rem;overflow-x:auto;}
  .nav-links a{
    color:var(--ink-soft);text-decoration:none;font-size:.82rem;
    letter-spacing:.06em;white-space:nowrap;position:relative;padding-bottom:2px;
    transition:color .2s;
  }
  .nav-links a::after{
    content:"";position:absolute;left:0;bottom:-1px;width:0;height:1.5px;
    background:var(--accent);transition:width .25s;
  }
  .nav-links a:hover{color:var(--accent);}
  .nav-links a:hover::after{width:100%;}

  /* ---- 头部 Hero ---- */
  .hero{padding:clamp(3rem,8vw,6rem) 0 clamp(2rem,5vw,3.5rem);}
  .hero .kicker{
    font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;
    color:var(--accent);font-weight:500;margin-bottom:1.1rem;
  }
  .hero h1{
    font-family:var(--serif);font-weight:600;line-height:1.08;
    font-size:clamp(2.4rem,6vw,4.4rem);letter-spacing:-.01em;
  }
  .hero .name-en{
    font-family:var(--serif);font-style:italic;font-weight:400;
    color:var(--ink-faint);font-size:clamp(1.1rem,2.4vw,1.5rem);margin-top:.5rem;
  }
  .hero .intro{
    margin-top:1.6rem;max-width:60ch;color:var(--ink-soft);
    font-size:1.05rem;font-weight:300;
  }
  .hero .meta{
    margin-top:1.7rem;display:flex;flex-wrap:wrap;gap:.4rem 1.6rem;
    font-size:.9rem;color:var(--ink-faint);
  }
  .hero .meta a{color:var(--ink-soft);text-decoration:none;border-bottom:1px solid var(--line);transition:color .2s,border-color .2s;}
  .hero .meta a:hover{color:var(--accent);border-color:var(--accent);}

  /* ---- 分区标题 ---- */
  .section-head{display:flex;align-items:baseline;gap:1rem;margin:3.2rem 0 1.5rem;}
  .section-head h2{font-family:var(--serif);font-weight:600;font-size:1.55rem;white-space:nowrap;}
  .section-head .count{color:var(--ink-faint);font-size:.82rem;}
  .section-head .rule{flex:1;height:1px;background:var(--line);}

  /* ---- 成员卡片 ---- */
  .grid{
    display:grid;gap:1.2rem;
    grid-template-columns:repeat(auto-fill,minmax(min(100%,290px),1fr));
  }
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:1.5rem;display:flex;flex-direction:column;gap:.55rem;
    transition:transform .28s ease,box-shadow .28s ease,border-color .28s ease;
  }
  .card:hover{
    transform:translateY(-4px);
    box-shadow:0 16px 34px -18px rgba(30,28,23,.38);
    border-color:color-mix(in srgb,var(--accent) 42%, var(--line));
  }
  .card-top{display:flex;gap:.95rem;align-items:center;}
  .avatar{
    width:58px;height:58px;border-radius:50%;flex:0 0 auto;object-fit:cover;overflow:hidden;
    background:var(--accent-soft);display:flex;align-items:center;justify-content:center;
    color:var(--accent);font-family:var(--serif);font-weight:600;font-size:1.4rem;
    border:1px solid color-mix(in srgb,var(--accent) 18%, var(--line));
  }
  .card-name{font-family:var(--serif);font-weight:600;font-size:1.22rem;line-height:1.2;}
  .card-name-en{font-family:var(--serif);font-style:italic;font-weight:400;font-size:.92rem;color:var(--ink-faint);margin-left:.1rem;}
  .card-title{color:var(--ink-soft);font-size:.9rem;margin-top:.15rem;}
  .tag{
    align-self:flex-start;font-size:.72rem;letter-spacing:.04em;color:var(--accent);
    background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 22%, transparent);
    padding:.16rem .55rem;border-radius:999px;
  }
  .card-interests{color:var(--ink-soft);font-size:.92rem;font-weight:300;}
  .card-note{color:var(--ink-faint);font-size:.86rem;font-style:italic;}
  .card-links{margin-top:auto;padding-top:.5rem;display:flex;gap:.75rem;align-items:center;}
  .card-links a{color:var(--ink-faint);display:inline-flex;transition:color .2s,transform .2s;}
  .card-links a:hover{color:var(--accent);transform:translateY(-2px);}
  .card-links svg{width:18px;height:18px;display:block;}

  /* ---- 页脚 ---- */
  footer{margin-top:4.5rem;padding:2.6rem 0 3.5rem;border-top:1px solid var(--line);color:var(--ink-faint);font-size:.9rem;}
  footer .foot-name{font-family:var(--serif);color:var(--ink);font-size:1.05rem;font-weight:600;margin-bottom:.4rem;}
  footer a{color:var(--ink-soft);text-decoration:none;border-bottom:1px solid var(--line);}
  footer a:hover{color:var(--accent);border-color:var(--accent);}

  /* ---- 载入动画 ---- */
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  .reveal{opacity:0;animation:fadeUp .6s cubic-bezier(.2,.7,.2,1) forwards;animation-delay:calc(var(--i,0)*55ms);}
  @media (prefers-reduced-motion:reduce){.reveal{animation:none;opacity:1;}}

  @media (max-width:760px){
    .nav-links{display:none;}
  }
</style>
</head>

function linkEl(url,type,label){

function avatarEl(m){

  return `<div class="avatar" aria-hidden="true">${esc(initial)}</div>`;
}

  ].join("");
  return `
  <article class="card reveal" style="--i:${i}">
    <div class="card-top">
      ${avatarEl(m)}
      <div>
        <div class="card-name">${esc(m.name)}${m.nameEn?` <span class="card-name-en">${esc(m.nameEn)}</span>`:""}</div>
        ${m.title?`<div class="card-title">${esc(m.title)}</div>`:""}
      </div>
    </div>
    ${m.year?`<span class="tag">${esc(m.year)}</span>`:""}
    ${m.interests?`<p class="card-interests">${esc(m.interests)}</p>`:""}
    ${m.note?`<p class="card-note">${esc(m.note)}</p>`:""}
    ${links.trim()?`<div class="card-links">${links}</div>`:""}
  </article>`;
}

function render(){
  document.title = LAB_INFO.name || "课题组主页";
  document.getElementById("nav-brand").textContent = LAB_INFO.name || "";

  // Hero
  const hero = document.getElementById("hero");
  let heroHTML = "";
  if(LAB_INFO.institution) heroHTML += `<div class="kicker reveal" style="--i:0">${esc(LAB_INFO.institution)}</div>`;
  heroHTML += `<h1 class="reveal" style="--i:1">${esc(LAB_INFO.name||"")}</h1>`;
  if(LAB_INFO.nameEn) heroHTML += `<div class="name-en reveal" style="--i:2">${esc(LAB_INFO.nameEn)}</div>`;
  if(LAB_INFO.intro) heroHTML += `<p class="intro reveal" style="--i:3">${esc(LAB_INFO.intro)}</p>`;
  const metaBits = [];
  if(LAB_INFO.email) metaBits.push(`联系邮箱 <a href="mailto:${esc(LAB_INFO.email)}">${esc(LAB_INFO.email)}</a>`);
  if(LAB_INFO.address) metaBits.push(esc(LAB_INFO.address));
  if(metaBits.length) heroHTML += `<div class="meta reveal" style="--i:4">${metaBits.map(b=>`<span>${b}</span>`).join("")}</div>`;
  hero.innerHTML = heroHTML;

  // 按分组归类
  const groups = {};
  MEMBERS.forEach(m=>{(groups[m.category]=groups[m.category]||[]).push(m);});
  const cats = [...CATEGORY_ORDER.filter(c=>groups[c]), ...Object.keys(groups).filter(c=>!CATEGORY_ORDER.includes(c))];

  // 渲染分组与导航
  const nav = document.getElementById("nav-links");
  const container = document.getElementById("members");
  let navHTML = "", bodyHTML = "", idx = 5;
  cats.forEach((cat,gi)=>{
    const id = "group-"+gi;
    navHTML += `<a href="#${id}">${esc(cat)}</a>`;
    const cards = groups[cat].map(m=>cardEl(m,idx++)).join("");
    bodyHTML += `
    <section id="${id}">
      <div class="section-head reveal" style="--i:${idx}">
        <h2>${esc(cat)}</h2>
        <span class="count">${groups[cat].length}</span>
        <span class="rule"></span>
      </div>
      <div class="grid">${cards}</div>
    </section>`;
  });
  nav.innerHTML = navHTML;
  container.innerHTML = bodyHTML;

  // 页脚
  const foot = [];
  foot.push(`<div class="foot-name">${esc(LAB_INFO.name||"")}</div>`);
  if(LAB_INFO.address) foot.push(`<div>${esc(LAB_INFO.address)}</div>`);
  if(LAB_INFO.email) foot.push(`<div>Email · <a href="mailto:${esc(LAB_INFO.email)}">${esc(LAB_INFO.email)}</a></div>`);
  foot.push(`<div style="margin-top:1rem;">© ${new Date().getFullYear()} ${esc(LAB_INFO.name||"")}</div>`);
  document.getElementById("footer").innerHTML = foot.join("");
}

render();
</script>
</body>
</html>
